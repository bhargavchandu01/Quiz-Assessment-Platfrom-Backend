services:
  # Spring Boot Web Service
  - type: web
    name: quiz-platform-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      # Database connection parameters (to be provided during deployment, pointing to Railway MySQL)
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        generateValue: true
      - key: ALLOWED_CORS_ORIGINS
        sync: false
