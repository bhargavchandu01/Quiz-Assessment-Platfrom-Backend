# ===========================
# Application Configuration
# ===========================
spring.application.name=quiz-assessment-platform
server.port=8080

# ===========================
# H2 In-Memory Database (Dev)
# ===========================
spring.datasource.url=jdbc:h2:mem:quizdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# MySQL Configuration (Prod)
# ===========================
# spring.datasource.url=jdbc:mysql://localhost:3306/quizdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL: org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=BVgUL7Db40uLpjSK9xRSdeoUlHhp2O2UwmDKGZoVNMY=
app.jwt.expiration-ms=86400000

# ===========================
# Logging
# ===========================
logging.level.com.quizplatform=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
